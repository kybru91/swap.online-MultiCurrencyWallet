name: Apps URL Health Check

on:
  push:
    branches: [master, main]
    paths:
      - 'src/front/shared/pages/Apps/appsCatalog.ts'
      - 'tests/e2e/appsUrlCheck.js'
      - '.github/workflows/appsUrlCheck.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  url-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18.20.0'

      - name: Check all app URLs return HTTP 2xx
        run: node tests/e2e/appsUrlCheck.js
