name: Build WordPress plugin

on:
  # Legacy: pushed builds to swaponline/WalletWpPlugin GitHub repo.
  # Replaced by deploy.yml (SSH deploy + ZIP). Keep for manual runs only.
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: npm install, build and deploy 
      run: |
        npm i
        git config --global user.email "bot@swaponline.io"
        git config --global user.name "buildbot"
        sh scripts/buildWordPressPlugin $super_secret
      env:
        CI: true
        super_secret: ${{ secrets.buildbot }}

