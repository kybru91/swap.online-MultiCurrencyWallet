name: Deploy Multi Currency Wallet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SKILL.md exists
        run: |
          if [ ! -f SKILL.md ]; then
            echo ""
            echo "❌  SKILL.md not found!"
            echo ""
            echo "    Every crypto product must have SKILL.md — a guide for AI agents."
            echo "    Create SKILL.md with these sections:"
            echo ""
            echo "      ## What is this project   — description, live URL, repo link"
            echo "      ## Stack                  — tech stack (frontend, contracts, hosting)"
            echo "      ## Repository structure   — key files/dirs and their purpose"
            echo "      ## Build & Deploy         — build commands, CI pipeline, server paths"
            echo "      ## Common tasks           — how to add networks, update contracts, fund farms"
            echo "      ## Troubleshooting        — known errors and fixes"
            echo ""
            echo "    Example: https://github.com/noxonsu/farmfactory/blob/main/SKILL.md"
            echo ""
            exit 1
          fi
          echo "✓ SKILL.md found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Generate version
        id: version
        run: |
          VERSION="2.$(date -u +%y.%m%d)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Update version in plugin files
        run: |
          # Update plugin header version
          sed -i "s/^ \* Version: .*/ * Version: ${{ env.VERSION }}/" wordpress/multi-currency-wallet-pro.php

          # Update MCWALLET_VER constant
          sed -i "s/define( 'MCWALLET_VER', '.*' );/define( 'MCWALLET_VER', '${{ env.VERSION }}' );/" wordpress/multi-currency-wallet-pro.php

          echo "Updated wordpress/multi-currency-wallet-pro.php:"
          grep -E "Version:|MCWALLET_VER" wordpress/multi-currency-wallet-pro.php

      - name: Install dependencies
        run: npm install

      - name: Build mainnet widget
        run: |
          npm run build:mainnet-widget
          if [ ! -d "build-mainnet-widget" ]; then
            echo "Error: build-mainnet-widget directory not found"
            exit 1
          fi
          echo "✓ Mainnet widget build completed"
          ls -la build-mainnet-widget/ | head -10

      - name: Build testnet widget
        run: |
          npm run build:testnet-widget
          if [ ! -d "build-testnet-widget" ]; then
            echo "Error: build-testnet-widget directory not found"
            exit 1
          fi
          echo "✓ Testnet widget build completed"
          ls -la build-testnet-widget/ | head -10

      - name: Copy builds to wordpress/vendors/swap
        run: |
          # Copy mainnet build
          mkdir -p wordpress/vendors/swap
          cp -r build-mainnet-widget/* wordpress/vendors/swap/
          # WordPress plugin reads app.js/vendor.js/app.css (unhashed) via load-app.php / front-scripts.php
          cp build-mainnet-widget/mainnet-app.*.js wordpress/vendors/swap/app.js
          cp build-mainnet-widget/mainnet-vendor.*.js wordpress/vendors/swap/vendor.js
          cp build-mainnet-widget/app.*.css wordpress/vendors/swap/app.css

          # Copy testnet build
          mkdir -p wordpress/vendors/swap/testnet
          cp -r build-testnet-widget/* wordpress/vendors/swap/testnet/
          cp build-testnet-widget/testnet-app.*.js wordpress/vendors/swap/testnet/app.js
          cp build-testnet-widget/testnet-vendor.*.js wordpress/vendors/swap/testnet/vendor.js
          cp build-testnet-widget/app.*.css wordpress/vendors/swap/testnet/app.css

          echo "✓ Builds copied to wordpress/vendors/swap"
          ls -la wordpress/vendors/swap/ | head -10

      - name: Create info.json
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | sed "s/'/'/g" | sed 's/"/\\"/g')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cat > info.json << EOF
          {
            "name": "Multi Currency Wallet Pro",
            "version": "${{ env.VERSION }}",
            "tested": "6.7",
            "requires": "5.0",
            "requires_php": "7.4",
            "download_url": "https://farm.wpmix.net/updates/mcw-v${{ env.VERSION }}.zip",
            "last_updated": "${TIMESTAMP}",
            "sections": {
              "description": "Simplest Multi-currency wallet for WordPress - supports Bitcoin, Ethereum, and ERC20/BEP20 tokens with exchange",
              "installation": "Upload the plugin files to /wp-content/plugins/multi-currency-wallet-pro/, then activate the plugin through the Plugins menu in WordPress",
              "changelog": "<h4>${{ env.VERSION }}</h4><ul><li>${COMMIT_MSG}</li></ul>"
            }
          }
          EOF

          echo "Generated info.json:"
          cat info.json | python3 -m json.tool || cat info.json

      - name: Create WordPress plugin package
        run: |
          echo "Creating WordPress plugin package..."

          # Create package directory with plugin subdirectory (WordPress standard)
          mkdir -p mcw-package/multi-currency-wallet-pro

          # Copy all WordPress plugin files from wordpress/ directory
          echo "Copying WordPress plugin files..."
          cp -r wordpress/* mcw-package/multi-currency-wallet-pro/

          # Copy additional files if they exist
          if [ -f "README.md" ]; then
            cp README.md mcw-package/multi-currency-wallet-pro/
          fi
          if [ -f "LICENSE" ]; then
            cp LICENSE mcw-package/multi-currency-wallet-pro/
          fi

          # Verify structure
          echo "Package structure:"
          ls -la mcw-package/multi-currency-wallet-pro/ | head -20

          # Create ZIP (from package directory, so multi-currency-wallet-pro/ is the root in ZIP)
          cd mcw-package
          zip -r ../mcw-v${{ env.VERSION }}.zip multi-currency-wallet-pro
          cd ..

          # Verify ZIP
          if [ ! -f "mcw-v${{ env.VERSION }}.zip" ]; then
            echo "Error: ZIP file not created"
            exit 1
          fi

          echo "Package created: mcw-v${{ env.VERSION }}.zip"
          ls -lh mcw-v${{ env.VERSION }}.zip
          echo "ZIP contents:"
          unzip -l mcw-v${{ env.VERSION }}.zip | head -30

      - name: Upload to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "mcw-v${{ env.VERSION }}.zip,info.json"
          target: "/home/walletwpmixnet/incoming/"

      - name: Deploy info.json to updates directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            UPDATES_DIR="/home/farmFactory/web/farm.wpmix.net/public_html/updates"
            mkdir -p "$UPDATES_DIR"

            cp /home/walletwpmixnet/incoming/info.json "$UPDATES_DIR/mcw-info.json"
            chmod 644 "$UPDATES_DIR/mcw-info.json"

            echo "mcw-info.json updated:"
            cat "$UPDATES_DIR/mcw-info.json"

      - name: Deploy WordPress plugin ZIP to updates directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            UPDATES_DIR="/home/farmFactory/web/farm.wpmix.net/public_html/updates"
            mkdir -p "$UPDATES_DIR"

            # Move ZIP file from incoming to shared updates directory
            cp /home/walletwpmixnet/incoming/mcw-v${{ env.VERSION }}.zip \
               "$UPDATES_DIR/"

            chmod 644 "$UPDATES_DIR/mcw-v${{ env.VERSION }}.zip"

            echo "WordPress plugin package deployed:"
            ls -lh "$UPDATES_DIR/mcw-v${{ env.VERSION }}.zip"

      - name: Deploy to growup.wpmix.net (WP auto-update source)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            GROWUP_DIR="/home/growup/web/growup.wpmix.net/public_html/wp-content/uploads/multi-currency-wallet-pro"
            mkdir -p "$GROWUP_DIR"

            # Copy ZIP as the canonical download for WP auto-updater
            cp /home/walletwpmixnet/incoming/mcw-v${{ env.VERSION }}.zip \
               "$GROWUP_DIR/multi-currency-wallet-pro.zip"
            chmod 644 "$GROWUP_DIR/multi-currency-wallet-pro.zip"

            # Write info.json that WP plugin reads for version check
            cat > "$GROWUP_DIR/info.json" << 'INFOJSON'
            {
              "name": "Multi Currency Wallet Pro",
              "version": "VERSION_PLACEHOLDER",
              "tested": "6.7",
              "requires": "5.0",
              "requires_php": "7.4",
              "download_url": "https://growup.wpmix.net/wp-content/uploads/multi-currency-wallet-pro/multi-currency-wallet-pro.zip",
              "last_updated": "TIMESTAMP_PLACEHOLDER",
              "sections": {
                "description": "Simplest Multi-currency wallet for WordPress - supports Bitcoin, Ethereum, and ERC20/BEP20 tokens with exchange",
                "installation": "Upload the plugin files to /wp-content/plugins/multi-currency-wallet-pro/, then activate the plugin through the Plugins menu in WordPress"
              }
            }
            INFOJSON

            # Substitute version and timestamp
            sed -i "s/VERSION_PLACEHOLDER/${{ env.VERSION }}/g" "$GROWUP_DIR/info.json"
            sed -i "s/TIMESTAMP_PLACEHOLDER/$(date -u +"%Y-%m-%d %H:%M:%S")/g" "$GROWUP_DIR/info.json"
            chmod 644 "$GROWUP_DIR/info.json"

            echo "growup.wpmix.net updated:"
            cat "$GROWUP_DIR/info.json"

      - name: Deploy plugin directly to wallet.wpmix.net
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PLUGIN_DIR="/home/walletwpmixnet/web/wallet.wpmix.net/public_html/wp-content/plugins/multi-currency-wallet-pro"

            # Extract new plugin version directly into plugin directory
            cd /tmp
            unzip -o /home/walletwpmixnet/incoming/mcw-v${{ env.VERSION }}.zip -d mcw-unpack-${{ env.VERSION }} > /dev/null
            rsync -a --delete mcw-unpack-${{ env.VERSION }}/multi-currency-wallet-pro/ "$PLUGIN_DIR/"
            rm -rf mcw-unpack-${{ env.VERSION }}

            # Ensure the symlink still exists
            SYMLINK="/home/walletwpmixnet/web/wallet.wpmix.net/public_html/wp-content/plugins/multi-currency-wallet-pro-master"
            if [ ! -L "$SYMLINK" ]; then
              ln -s "$PLUGIN_DIR" "$SYMLINK"
            fi

            # Clear load-app.php cache (stale cached app.js from previous versions)
            UPLOADS_DIR="/home/walletwpmixnet/web/wallet.wpmix.net/public_html/wp-content/uploads"
            rm -f "$UPLOADS_DIR"/swap-wallet-app-*.js
            echo "load-app.php cache cleared"

            echo "wallet.wpmix.net plugin updated to ${{ env.VERSION }}:"
            grep "MCWALLET_VER\|Version:" "$PLUGIN_DIR/multi-currency-wallet-pro.php" | head -3

      - name: Deploy to appsource/wallet
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.APPSOURCE_TOKEN }}
          external_repository: appsource/wallet
          publish_branch: gh-pages
          publish_dir: ./build-mainnet-widget
          force_orphan: true

      - name: Health check
        run: |
          sleep 10

          # Check growup.wpmix.net info.json
          GU_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://growup.wpmix.net/wp-content/uploads/multi-currency-wallet-pro/info.json || echo "000")
          if [ "$GU_CODE" = "200" ]; then
            echo "✓ growup.wpmix.net info.json OK (HTTP $GU_CODE)"
          else
            echo "⚠ growup.wpmix.net info.json HTTP $GU_CODE"
          fi

          # Check wallet.wpmix.net is up
          WP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://wallet.wpmix.net/ || echo "000")
          if [ "$WP_CODE" = "200" ]; then
            echo "✓ wallet.wpmix.net OK (HTTP $WP_CODE)"
          else
            echo "⚠ wallet.wpmix.net HTTP $WP_CODE"
          fi

          # Check farm.wpmix.net info.json
          FM_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://farm.wpmix.net/updates/mcw-info.json || echo "000")
          if [ "$FM_CODE" = "200" ]; then
            echo "✓ farm.wpmix.net mcw-info.json OK (HTTP $FM_CODE)"
          else
            echo "⚠ farm.wpmix.net mcw-info.json HTTP $FM_CODE"
          fi

          # Check appsource/wallet GitHub Pages
          GH_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://appsource.github.io/wallet/ || echo "000")
          if [ "$GH_CODE" = "200" ]; then
            echo "✓ appsource.github.io/wallet OK (HTTP $GH_CODE)"
          else
            echo "⚠ appsource.github.io/wallet HTTP $GH_CODE (non-blocking)"
          fi

      - name: Notify completion
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ Multi Currency Wallet deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "Package: mcw-v${{ env.VERSION }}.zip"
          echo "Info: https://farm.wpmix.net/updates/mcw-info.json"
          echo "Download: https://farm.wpmix.net/updates/mcw-v${{ env.VERSION }}.zip"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify failure
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✗ Multi Currency Wallet deployment failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "Check workflow logs for details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
