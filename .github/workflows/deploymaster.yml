name: Deploy to swaponline.github.io

on:
  # Trigger the workflow on push or pull request,
  # but only for the master branch
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.20.0]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: npm install, build and deploy
      run: |
        npm i
        git config --global user.email "bot@swaponline.io"
        git config --global user.name "buildbot"
        sh scripts/deploy $super_secret
      env:
        CI: true
        super_secret: ${{ secrets.buildbot }}

    - name: Install Chromium for health check
      run: npx puppeteer browsers install chrome

    - name: Health check — verify swaponline.github.io renders without JS errors
      run: |
        node << 'HEALTHCHECK'
        const puppeteer = require('puppeteer')

        ;(async () => {
          const browser = await puppeteer.launch({
            args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu'],
            headless: true
          })
          const page = await browser.newPage()

          const jsErrors = []
          page.on('pageerror', err => jsErrors.push(err.message))

          // Wait for GitHub Pages CDN to propagate
          await new Promise(r => setTimeout(r, 30000))

          let loaded = false
          for (let attempt = 1; attempt <= 3; attempt++) {
            try {
              await page.goto('https://swaponline.github.io/#/wallet', {
                waitUntil: 'networkidle2',
                timeout: 60000
              })
              loaded = true
              break
            } catch (e) {
              console.log('Attempt ' + attempt + ' failed: ' + e.message)
              if (attempt < 3) await new Promise(r => setTimeout(r, 10000))
            }
          }

          if (!loaded) {
            console.error('FAIL: Could not load swaponline.github.io after 3 attempts')
            await browser.close()
            process.exit(1)
          }

          await page.evaluate(() => {
            const modal = document.getElementById('starter-modal')
            if (modal) modal.classList.add('d-none')
          })

          await new Promise(r => setTimeout(r, 5000))

          const criticalErrors = jsErrors.filter(e =>
            e.includes('Unknown configuration property') ||
            e.includes('ChunkLoadError') ||
            e.includes('Loading chunk')
          )

          const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 100))
          console.log('Page content preview: ' + bodyText.replace(/\n/g, ' '))
          console.log('JS errors total: ' + jsErrors.length)

          await browser.close()

          if (criticalErrors.length > 0) {
            console.error('FAIL: Critical JS errors on #/wallet:')
            criticalErrors.forEach(e => console.error(' - ' + e.substring(0, 120)))
            process.exit(1)
          }

          console.log('PASS: swaponline.github.io/#/wallet loaded without critical errors')
        })()
        HEALTHCHECK
